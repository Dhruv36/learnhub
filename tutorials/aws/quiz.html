<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Quizzes — LearnHub</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header class="site-header">
  <a class="logo" href="../../index.html">Learn<span>Hub</span></a>
  <nav><a href="index.html">← AWS Track</a><a href="../../playground/index.html">Playground</a></nav>
</header>

<main class="content" style="max-width:860px;margin:0 auto;">
  <div id="hub">
    <h1>AWS Quizzes</h1>
    <p>Ten quizzes · 20 questions each · instant scoring with an explanation for every answer.
       Work through them in order — Quiz 10 is a mixed, interview-difficulty mock exam.</p>
    <div class="quiz-grid" id="quizGrid"></div>
  </div>

  <div id="runner" hidden>
    <p><a href="quiz.html">← All AWS quizzes</a></p>
    <h1 id="quizTitle"></h1>
    <p id="quizDesc" style="color:var(--muted)"></p>
    <div id="quiz"></div>
    <button class="btn" id="submitBtn">Submit Answers</button>
    <p class="quiz-result" id="result"></p>
  </div>
</main>

<script src="quiz-bank-1.js"></script>
<script src="quiz-bank-2.js"></script>
<script src="../../js/quiz.js"></script>
<script>
const sets = window.QUIZ_SETS;
const setNum = Number(new URLSearchParams(location.search).get("set"));

if (setNum >= 1 && setNum <= sets.length) {
  const s = sets[setNum - 1];
  document.getElementById("hub").hidden = true;
  document.getElementById("runner").hidden = false;
  document.title = `${s.title} — LearnHub`;
  document.getElementById("quizTitle").textContent = s.title;
  document.getElementById("quizDesc").textContent = `${s.desc} · ${s.questions.length} questions`;
  renderQuiz(s.questions);
} else {
  document.getElementById("quizGrid").innerHTML = sets.map((s, i) => `
    <a class="quiz-card" href="quiz.html?set=${i + 1}">
      <h3>${s.title.split(" · ")[0]}</h3>
      <p>${s.title.split(" · ")[1] || ""}</p>
      <p>${s.desc}</p>
      <p><strong>${s.questions.length} questions →</strong></p>
    </a>`).join("");
}
</script>

</body>
</html>
