<script>
renderQuiz([
  { q: "During a network partition, a CP system will:",
    options: ["Serve stale data to stay up", "Refuse some requests to stay consistent", "Automatically merge conflicting writes", "Switch to a backup region"],
    answer: 1 },
  { q: "With hash(key) % N sharding, adding one server remaps roughly:",
    options: ["1/N of keys", "Half the keys", "Almost all keys", "No keys"],
    answer: 2 },
  { q: "Why do consistent-hashing rings use virtual nodes?",
    options: ["To encrypt key placement", "To even out load distribution across servers", "To make lookups O(1)", "To eliminate hot keys entirely"],
    answer: 1 },
  { q: "In cache-aside, after updating the database you should:",
    options: ["Update the cache with the new value", "Delete the cache key", "Extend the key's TTL", "Do nothing — TTL handles it"],
    answer: 1 },
  { q: "A hot cache key expires and 50,000 concurrent requests hit the DB. This is called:",
    options: ["Cache penetration", "Cache avalanche", "Cache stampede (thundering herd)", "Replication lag"],
    answer: 2 },
  { q: "~1 million requests/day is approximately what average QPS?",
    options: ["~1", "~12", "~120", "~1200"],
    answer: 1 },
  { q: "A user edits their profile but still sees the old value (async replica read). The cheapest fix:",
    options: ["Make all reads hit the primary", "Switch to synchronous replication", "Read-your-own-writes routing after a write", "Use a CDN"],
    answer: 2 },
  { q: "Which is TRUE about horizontal web-tier scaling?",
    options: ["Servers must be stateless (sessions externalized)", "It requires sharding first", "It only works with microservices", "It removes the need for load balancing"],
    answer: 0 }
]);
