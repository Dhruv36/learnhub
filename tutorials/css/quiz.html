<main class="content" style="max-width:800px;margin:0 auto;">
  <h1>CSS Quiz — Full Track</h1>

<script src="../../js/quiz.js"></script>
<script>
renderQuiz([
  { q: "Which selector wins: .card .title (two classes) or #main (one ID)?",
    options: [".card .title — two beats one", "#main — one ID outranks any number of classes", "Whichever comes later in the file"],
    answer: 1 },
  { q: "With box-sizing: border-box, width: 300px means:",
    options: ["Content is 300px; padding/border add to it", "Content + padding + border total 300px", "Content + padding + border + margin total 300px"],
    answer: 1 },
  { q: "Why use rem instead of px for font sizes?",
    options: ["rem renders faster", "Respects users who raise their browser's default font size", "px is deprecated"],
    answer: 1 },
  { q: "A .modal has z-index: 9999 but renders under the header. Most likely cause:",
    options: ["The header's z-index is higher", "An ancestor of .modal creates a stacking context (transform/opacity) that caps it", "z-index needs !important"],
    answer: 1 },
  { q: "Layout in ONE dimension (a toolbar row) vs TWO dimensions (a page shell) — which tools?",
    options: ["Grid for both", "Flexbox for both", "Flexbox for one dimension, Grid for two"],
    answer: 2 },
  { q: "repeat(auto-fill, minmax(220px, 1fr)) achieves:",
    options: ["Fixed 220px columns with leftover space empty", "As many ≥220px columns as fit, sharing space — responsive without media queries", "Exactly one column below 220px viewport width"],
    answer: 1 },
  { q: "Which pair is safe to animate at 60fps?",
    options: ["width and top", "transform and opacity", "height and box-shadow"],
    answer: 1 },
  { q: "In cascade layers, a .hidden utility (later layer) vs #app .modal .content (earlier layer):",
    options: ["The ID chain wins — higher specificity", "The utility wins — later layer beats specificity", "They tie; file order decides"],
    answer: 1 },
  { q: "Container queries solve what media queries can't:",
    options: ["Dark mode detection", "Components adapting to their own available space, not the viewport", "Print stylesheets"],
    answer: 1 },
  { q: "A design system's colors should reach components via:",
    options: ["Hex values with good comments", "Semantic tokens (--color-action) referencing a raw palette tier", "Sass variables compiled per theme"],
    answer: 1 }
]);
</script>
