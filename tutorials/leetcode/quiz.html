<header class="site-header">

<main class="content" style="max-width:800px;margin:0 auto;">
  <h1>Pattern Recognition Quiz</h1>
  <p>The interview skill: read a problem, name the pattern. No coding — just recognition.</p>
  <div id="quiz"></div>
  <button class="btn" id="submitBtn">Submit Answers</button>
  <p class="quiz-result" id="result"></p>
</main>

<script src="../../js/quiz.js"></script>
<script>
renderQuiz([
  { q: "\"Find the longest substring with at most K distinct characters.\" Which pattern?",
    options: ["Two Pointers (converging)", "Sliding Window", "Binary Search", "Dynamic Programming"],
    answer: 1 },
  { q: "\"Given a SORTED array, find two numbers that add up to target.\" Which pattern?",
    options: ["Hash Map", "Two Pointers (converging)", "Sliding Window", "Backtracking"],
    answer: 1 },
  { q: "\"Minimize the maximum pages a student must read\" with n up to 10⁹. Which pattern?",
    options: ["Greedy", "Prefix Sum", "Binary Search on the answer", "Heap / Top-K"],
    answer: 2 },
  { q: "\"Detect if a linked list has a cycle\" in O(1) space. Which pattern?",
    options: ["Fast & Slow Pointers", "Two Pointers (converging)", "Union-Find", "Stack"],
    answer: 0 },
  { q: "\"Find all UNIQUE triplets summing to zero.\" What is the optimal first step?",
    options: ["Build a hash map of all pairs", "Sort the array", "Try all triplets with pruning", "Binary search each element"],
    answer: 1 },
  { q: "Why can't Sliding Window find \"max-sum subarray\" when negatives exist?",
    options: ["The window would overflow", "Sorting is required first", "Window validity is no longer monotonic", "It can — with two extra pointers"],
    answer: 2 }
]);
</script>
