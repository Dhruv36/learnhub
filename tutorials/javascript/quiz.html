<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Quiz — LearnHub</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header class="site-header">
  <a class="logo" href="../../index.html">Learn<span>Hub</span></a>
  <nav><a href="index.html">← JS Track</a></nav>
</header>

<main class="content" style="max-width:800px;margin:0 auto;">
  <h1>JavaScript Quiz — Full Track</h1>
  <p>Twelve questions spanning Basics through Ultra-Advanced. 10+ correct = ready for React or Node.js.</p>
  <div id="quiz"></div>
  <button class="btn" id="submitBtn">Submit Answers</button>
  <p class="quiz-result" id="result"></p>
</main>

<script src="../../js/quiz.js"></script>
<script>
renderQuiz([
  { q: "const user = { name: \"A\" }; user.name = \"B\"; — what happens?",
    options: ["TypeError — const is immutable", "Works — const prevents reassignment, not mutation", "Silent failure"],
    answer: 1 },
  { q: "Which comparison should you use by default?",
    options: ["== (flexible)", "=== (type and value)", "Object.is everywhere"],
    answer: 1 },
  { q: "count || 10 vs count ?? 10 — the difference appears when count is:",
    options: ["undefined", "null", "0 (|| replaces it, ?? keeps it)"],
    answer: 2 },
  { q: "Which array methods MUTATE the original?",
    options: ["map, filter, slice", "push, sort, splice", "toSorted, toReversed, with"],
    answer: 1 },
  { q: "for (var i=0;i<3;i++) setTimeout(()=>console.log(i)) prints:",
    options: ["0 1 2", "3 3 3 — one shared i in the closure", "undefined ×3"],
    answer: 1 },
  { q: "const f = user.greet; f(); — inside greet, this is:",
    options: ["user", "undefined (bare call in strict mode)", "window, always"],
    answer: 1 },
  { q: "console.log(1); setTimeout(()=>console.log(2)); Promise.resolve().then(()=>console.log(3)); console.log(4); prints:",
    options: ["1 4 3 2 — microtasks beat macrotasks", "1 4 2 3 — timers run first", "1 2 3 4"],
    answer: 0 },
  { q: "fetch() rejects its promise when:",
    options: ["The server returns 404 or 500", "Only on network failure — HTTP errors resolve with ok:false", "The response isn't JSON"],
    answer: 1 },
  { q: "Three independent API calls with no data dependencies — fastest correct approach:",
    options: ["await each in sequence", "Promise.all([a(), b(), c()])", "ids.forEach(async …)"],
    answer: 1 },
  { q: "In TypeScript, data from res.json() should be typed as:",
    options: ["any — it's external", "unknown, then validated (e.g. zod) into a real type", "The interface you expect — trust the API"],
    answer: 1 },
  { q: "A modal component adds window listeners on open. Closing it without removing them causes:",
    options: ["Nothing — GC collects closed modals", "A leak: listeners keep the modal (and captures) reachable", "A console warning"],
    answer: 1 },
  { q: "Parsing a 50MB CSV without freezing the UI — the right tool:",
    options: ["async/await around the parser", "A Web Worker — parsing is CPU-bound, async doesn't move compute", "setTimeout(parse, 0)"],
    answer: 1 }
]);
</script>

</body>
</html>
